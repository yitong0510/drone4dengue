name: Reverse Geocode Dengue Data

on:
  workflow_run:
    workflows: ["Store Dengue Data to Database"]
    types:
      - completed
  workflow_dispatch:  # Manual trigger also available
    inputs:
      batch_size:
        description: 'Number of records to process per batch'
        required: false
        default: '100'
        type: string
      delay_seconds:
        description: 'Delay between API calls (seconds)'
        required: false
        default: '1.5'
        type: string
      resume_from_id:
        description: 'Resume from specific record ID (optional)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  reverse-geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours maximum
    # Only run if triggered by workflow_run and the triggering workflow succeeded,
    # or if triggered manually via workflow_dispatch
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests urllib3 python-dotenv

      - name: Run Reverse Geocoding Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Handle inputs from both workflow_dispatch and workflow_run triggers
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '100' }}
          DELAY_SECONDS: ${{ github.event.inputs.delay_seconds || '1.5' }}
          RESUME_FROM_ID: ${{ github.event.inputs.resume_from_id || '' }}
        run: |
          cd reverse-geocoding
          python bulk_reverse_geocode.py

      - name: Upload Progress Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reverse-geocoding-progress
          path: reverse-geocoding/progress.log
          retention-days: 30