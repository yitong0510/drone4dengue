name: Store Dengue Data to Database

on:
  workflow_run:
    workflows: ["Train ML Models"]
    types:
      - completed
  # schedule:
  #   - cron: "0 13 * * *"  # Runs every day at 9pm Malaysia time (UTC+8 = 1pm UTC)
  workflow_dispatch:     # Allows manual trigger from the Actions tab

permissions:
  contents: write  # required to push commits with GITHUB_TOKEN
  
jobs:
  store-data:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (when triggered by workflow_run)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib geopandas shapely folium plotly pytz scikit-learn joblib seaborn psycopg2-binary

      - name: Store Dengue Data to Database
        working-directory: daily-scrap-dengue-data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python store_dengue_data_to_db.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Use PAT instead of GITHUB_TOKEN to trigger other workflows
          # IMPORTANT: Create a Personal Access Token (PAT) with repo scope and add it as secret GH_PAT
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --staged --quiet || (git commit -m "Daily update: data processing, ML model training, and database storage" && git pull --rebase origin ${{ github.ref_name }} && git push origin ${{ github.ref_name }})
      
      - name: Trigger Deployment Workflow (backup method)
        # This is a backup trigger in case the push event doesn't work
        # The push with PAT should trigger deploy-server-ml.yml automatically
        run: |
          # Check if server-ml files were staged/changed
          if git diff --cached --name-only | grep -q "^server-ml/" || git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "^server-ml/"; then
            echo "server-ml/ directory changed, triggering deployment via repository_dispatch..."
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{"event_type":"deploy-server-ml"}' || echo "Failed to trigger deployment, but push should trigger it automatically"
          else
            echo "No changes detected in server-ml/ directory."
          fi
