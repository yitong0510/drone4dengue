name: Train ML Models

on:
  workflow_run:
    # workflows: ["Process Dengue Data"]
    types:
      - completed
  # schedule:
  #   - cron: "0 13 * * *"  # Runs every day at 9pm Malaysia time (UTC+8 = 1pm UTC)
  workflow_dispatch:     # Allows manual trigger from the Actions tab

permissions:
  contents: write  # required to push commits with GITHUB_TOKEN
  
jobs:
  train-models:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (when triggered by workflow_run)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib geopandas shapely folium plotly pytz scikit-learn joblib seaborn psycopg2-binary xgboost lightgbm

      - name: Train ML Models
        working-directory: daily-scrap-dengue-data
        run: python dengue_ml_models_denguedata.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Use PAT instead of GITHUB_TOKEN to trigger other workflows
          # IMPORTANT: Create a Personal Access Token (PAT) with repo scope and add it as secret GH_PAT
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --staged --quiet || (git commit -m "Daily update: ML model training" && git pull --rebase origin ${{ github.ref_name }} && git push origin ${{ github.ref_name }})
